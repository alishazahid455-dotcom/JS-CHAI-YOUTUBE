<!DOCTYPE html>
<html>
<body>

<h2 id="text">Hello</h2>

<button id="btn">Click Me</button>

<script>

const btn = document.getElementById("btn");
const text = document.getElementById("text");

btn.addEventListener("click", function () {
    text.innerText = "Button Clicked!";
});

</script>

</body>
</html>
